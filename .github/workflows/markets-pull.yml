name: Markets data pull

# Runs four times daily PKT (Mon-Sat) to refresh the markets page data.
#   09:45 PKT = 04:45 UTC    (pre-market, overnight global closes)
#   12:30 PKT = 07:30 UTC    (PSX mid-session)
#   16:00 PKT = 11:00 UTC    (PSX just after close)
#   21:00 PKT = 16:00 UTC    (US mid-session, evening refresh)
# No Sunday runs. Can also be triggered manually from the Actions tab.

on:
  schedule:
    - cron: '45 4 * * 1-6'   # 09:45 PKT, Mon-Sat
    - cron: '30 7 * * 1-6'   # 12:30 PKT, Mon-Sat
    - cron: '0 11 * * 1-6'   # 16:00 PKT, Mon-Sat
    - cron: '0 16 * * 1-6'   # 21:00 PKT, Mon-Sat
  workflow_dispatch:          # manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  pull:
    runs-on: ubuntu-latest
    outputs:
      data_changed: ${{ steps.commit.outputs.data_changed }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests yfinance

      - name: Run markets pull
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/pull_markets.py

      - name: Commit and push if data changed
        id: commit
        run: |
          git config user.name  "Pulse Markets Bot"
          git config user.email "bot@thepulsepaper.com"
          git add src/data/markets.js src/data/markets-alerts.json src/data/.markets-prev.json src/data/.markets-weekly-kse.json src/data/.markets-petrol.json src/data/.markets-chart-history.json
          if git diff --cached --quiet; then
            echo "No data changes; nothing to commit."
            echo "data_changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Markets auto-update: $(TZ=Asia/Karachi date '+%Y-%m-%d %H:%M PKT')"
            git push
            echo "data_changed=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    needs: pull
    if: needs.pull.outputs.data_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - id: deployment
        uses: actions/deploy-pages@v4
